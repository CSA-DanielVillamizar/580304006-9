name: Despliegue Continuo (CD) - Docker Hub

on:
  push:
    branches: [ 'main' ]

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Descargar cµdigo fuente
      uses: actions/checkout@v4

    - name: Iniciar sesiµn en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Construir y empujar imagen a Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: ./GestionITM
        file: ./GestionITM/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/gestion-itm-api:latest
